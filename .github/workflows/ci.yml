name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-gate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FLOW_DEMO_MODE: "true"
      NEXT_PUBLIC_SITE_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy gate (unit + build + config + e2e)
        run: npm run smoke
        env:
          CI: "true"
          PW_USE_START: "true"

  staging-schema:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Schema check (optional)
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            npm ci
            node scripts/check-migrations.mjs
          else
            echo "Skipping schema check — SUPABASE_DB_PASSWORD secret not configured"
          fi
        env:
          NEXT_PUBLIC_FLOW_DEMO_MODE: "false"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          NEXT_PUBLIC_SITE_URL: https://flowproduction.space
