<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starting Flow…</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 55%, #020617 100%);
      color: #e2e8f0;
    }
    .card {
      text-align: center;
      padding: 2.5rem 3rem;
      border-radius: 1rem;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
      min-width: 18rem;
    }
    .logo {
      width: 3.5rem;
      height: 3.5rem;
      margin: 0 auto 1rem;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #2563eb;
      color: white;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .spinner {
      width: 2.25rem;
      height: 2.25rem;
      margin: 0 auto 1rem;
      border: 3px solid rgba(148, 163, 184, 0.25);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.35rem;
      font-weight: 600;
    }
    p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">F</div>
    <div class="spinner" aria-hidden="true"></div>
    <h1>Flow</h1>
    <p id="status">Starting…</p>
  </div>
  <script>
    const target = "http://127.0.0.1:3000/operations";
    const status = document.getElementById("status");
    let attempts = 0;

    function tryOpen() {
      attempts += 1;
      if (attempts > 8) {
        status.textContent = "Almost ready…";
      }
      if (attempts > 40) {
        status.textContent = "Still warming up. This can take a minute on first launch.";
      }

      const probe = new Image();
      probe.onload = function () {
        window.location.replace(target);
      };
      probe.onerror = function () {
        if (attempts < 180) {
          window.setTimeout(tryOpen, 400);
        } else {
          status.textContent = "Startup is taking longer than expected. Keep this tab open or relaunch Flow.";
        }
      };
      probe.src = "http://127.0.0.1:3000/favicon.ico?ts=" + Date.now();
    }

    tryOpen();
  </script>
</body>
</html>
